# 全局随机种子
random_seed: 42

# 数据路径
data:
  raw_path: "data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv"
  processed_path: "data/processed/"

# 模型参数
model:
  test_size: 0.2
  val_size: 0.1
  cv_folds: 5

# 逻辑回归
logistic_regression:
  max_iter: 1000
  C: 1.0

# 随机森林
random_forest:
  n_estimators: 100
  max_depth: 10
  min_samples_split: 5

# XGBoost
xgboost:
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8

# 可视化
visualization:
  figure_dpi: 150
  figsize: [12, 8]
  save_format: "png"
